name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Lint, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: MONKEY-PARTY
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: MONKEY-PARTY/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
