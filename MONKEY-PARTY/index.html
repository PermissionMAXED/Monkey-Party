<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0c1f12" />
    <title>MONKEY-PARTY</title>
    <style>
      /* Critical styles so the loading screen looks right before main.css arrives. */
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0c1f12;
      }
      #loading {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background:
          radial-gradient(ellipse 90% 60% at 50% -10%, rgba(58, 125, 68, 0.35), transparent 60%),
          radial-gradient(ellipse 70% 50% at 15% 110%, rgba(30, 80, 44, 0.45), transparent 65%),
          radial-gradient(ellipse 70% 50% at 85% 110%, rgba(24, 66, 36, 0.45), transparent 65%),
          linear-gradient(180deg, #08140c 0%, #0c1f12 55%, #10281a 100%);
        color: #e8f5d8;
        font-family: 'Trebuchet MS', 'Segoe UI', Verdana, sans-serif;
        transition: opacity 0.4s ease;
      }
      #loading.loading--done {
        opacity: 0;
        pointer-events: none;
      }
      #loading .loading__title {
        font-size: clamp(2rem, 7vw, 4rem);
        font-weight: 900;
        letter-spacing: 0.12em;
        color: #ffd94d;
        text-shadow:
          0 2px 0 #7a5c00,
          0 6px 24px rgba(0, 0, 0, 0.6);
      }
      #loading .loading__vine {
        width: min(320px, 60vw);
        height: 6px;
        border-radius: 3px;
        background: rgba(232, 245, 216, 0.15);
        overflow: hidden;
      }
      #loading .loading__vine::after {
        content: '';
        display: block;
        width: 40%;
        height: 100%;
        border-radius: 3px;
        background: linear-gradient(90deg, #58a35c, #9ed76a);
        animation: vine-swing 1.2s ease-in-out infinite alternate;
      }
      #loading .loading__hint {
        font-size: 0.95rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        opacity: 0.7;
      }
      @keyframes vine-swing {
        from { transform: translateX(-30%); }
        to { transform: translateX(240%); }
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="ui-root"></div>
    <div id="loading" aria-hidden="true">
      <div class="loading__title">MONKEY&nbsp;PARTY</div>
      <div class="loading__vine"></div>
      <div class="loading__hint">Swinging into the jungle&hellip;</div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
